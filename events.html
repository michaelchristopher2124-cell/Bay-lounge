<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Events - The Bay Lounge</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pure-black: #000000;
            --milk-cream: #FFFDD0;
            --glass-border: rgba(255, 253, 208, 0.2);
            --glass-bg: rgba(0, 0, 0, 0.6);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Lato', sans-serif;
            background: var(--pure-black);
            color: var(--milk-cream);
            min-height: 100vh;
            background-image: url('https://images.unsplash.com/photo-1470225620780-dba8ba36b745?q=80&w=1600');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6));
            z-index: -1;
        }

        h1, h2, h3, h4, .playfair {
            font-family: 'Playfair Display', serif;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        .nav-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--glass-border);
        }

        .logo {
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            text-decoration: none;
            color: var(--milk-cream);
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: var(--milk-cream);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 1px;
            transition: opacity 0.3s;
            position: relative;
        }

        .nav-links a:hover {
            opacity: 0.7;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--milk-cream);
            transition: width 0.3s;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .btn {
            background: var(--milk-cream);
            color: var(--pure-black);
            border: none;
            padding: 12px 25px;
            font-family: 'Lato', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(255, 253, 208, 0.3);
        }

        .page-title {
            font-size: 3rem;
            text-align: center;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .page-subtitle {
            text-align: center;
            margin-bottom: 50px;
            opacity: 0.8;
        }

        .loading {
            text-align: center;
            padding: 60px;
            font-size: 1.2rem;
        }

        .error {
            text-align: center;
            padding: 60px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            max-width: 600px;
            margin: 0 auto;
        }

        .error h3 {
            margin-bottom: 15px;
            color: #ff6b6b;
        }

        .retry-btn {
            margin-top: 20px;
            background: transparent;
            border: 1px solid var(--milk-cream);
            color: var(--milk-cream);
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .retry-btn:hover {
            background: var(--milk-cream);
            color: var(--pure-black);
        }

        .events-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        .event-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: transform 0.3s;
        }

        .event-card:hover {
            transform: translateY(-5px);
        }

        .event-image {
            width: 100%;
            height: 300px;
            object-fit: cover;
            display: block;
            background: var(--pure-black);
        }

        .event-image-placeholder {
            width: 100%;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.8);
            font-size: 3rem;
        }

        .event-content {
            padding: 30px;
        }

        .event-date {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .event-title {
            font-size: 1.8rem;
            margin-bottom: 15px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .event-desc {
            margin-bottom: 25px;
            line-height: 1.6;
            opacity: 0.9;
        }

        .ticket-section {
            border-top: 1px solid var(--glass-border);
            padding-top: 20px;
        }

        .ticket-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            opacity: 0.8;
        }

        .ticket-tiers {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .tier-btn {
            flex: 1;
            min-width: 100px;
            background: transparent;
            border: 1px solid var(--milk-cream);
            color: var(--milk-cream);
            padding: 12px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 1px;
            transition: all 0.3s;
            font-weight: 700;
        }

        .tier-btn:hover {
            background: var(--milk-cream);
            color: var(--pure-black);
        }

        .no-events {
            text-align: center;
            padding: 60px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            max-width: 600px;
            margin: 0 auto;
        }

        .no-events h3 {
            margin-bottom: 15px;
            font-size: 1.5rem;
        }

        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            color: var(--milk-cream);
            font-size: 1.5rem;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .mobile-menu-btn { display: block; }
            .page-title { font-size: 2rem; }
            .events-grid { grid-template-columns: 1fr; }
            .event-image, .event-image-placeholder { height: 200px; }
        }
    </style>
</head>
